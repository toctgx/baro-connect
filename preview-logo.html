<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<style>
  body { background: #f0f0f0; font-family: -apple-system, sans-serif; padding: 20px; }
  .card { background: #f0f0f0; border-radius: 18px; padding: 14px 16px; display: flex; align-items: center; gap: 14px; box-shadow: 6px 6px 12px rgba(0,0,0,0.1), -4px -4px 10px rgba(255,255,255,0.9); margin-bottom: 12px; }
  .icon { width: 52px; height: 52px; border-radius: 50%; display: flex; align-items: center; justify-content: center; flex: 0 0 auto; color: white; font-weight: 700; font-size: 13px; letter-spacing: -0.5px; }
  .info { flex: 1; }
  .name { font-size: 15px; font-weight: 600; color: #333; }
  .sub { font-size: 12px; color: #999; margin-top: 2px; }
  .tel { font-size: 14px; color: #c8a84b; font-weight: 600; margin-top: 3px; }
  .call { width: 44px; height: 44px; background: linear-gradient(135deg, #f0c040, #c8a020); border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 18px; box-shadow: 3px 3px 8px rgba(200,160,32,0.4); }
</style>
</head>
<body>

<!-- 긴급 - 빨강 -->
<div class="card">
  <div class="icon" style="background: linear-gradient(135deg, #ff4757, #c0392b)">긴급</div>
  <div class="info">
    <div class="name">경찰청 신고</div>
    <div class="sub">긴급 · 신고</div>
    <div class="tel">112</div>
  </div>
  <div class="call">📞</div>
</div>

<!-- 금융 - 파랑 -->
<div class="card">
  <div class="icon" style="background: linear-gradient(135deg, #3742fa, #2f3542)">KB</div>
  <div class="info">
    <div class="name">KB국민은행</div>
    <div class="sub">금융 · 은행</div>
    <div class="tel">1588-9999</div>
  </div>
  <div class="call">📞</div>
</div>

<!-- 식품 - 초록 -->
<div class="card">
  <div class="icon" style="background: linear-gradient(135deg, #2ed573, #1e9e50)">농심</div>
  <div class="info">
    <div class="name">농심 고객센터</div>
    <div class="sub">식품 · 라면</div>
    <div class="tel">1588-3267</div>
  </div>
  <div class="call">📞</div>
</div>

<!-- 명품 - 골드 -->
<div class="card">
  <div class="icon" style="background: linear-gradient(135deg, #c8a84b, #8B6914)">LV</div>
  <div class="info">
    <div class="name">루이비통 코리아</div>
    <div class="sub">명품 · 패션/잡화</div>
    <div class="tel">080-022-2255</div>
  </div>
  <div class="call">📞</div>
</div>

<!-- 자동차 - 다크블루 -->
<div class="card">
  <div class="icon" style="background: linear-gradient(135deg, #1e3799, #0a3d62)">현대</div>
  <div class="info">
    <div class="name">현대자동차 서비스</div>
    <div class="sub">자동차 · 국산차</div>
    <div class="tel">1588-1800</div>
  </div>
  <div class="call">📞</div>
</div>

</body>
</html>
