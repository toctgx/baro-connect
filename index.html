<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>바로연락</title>
  <link rel="manifest" href="manifest.json" />
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Pretendard:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #111111;
      --bg2: #1C1C1C;
      --bg3: #242424;
      --yellow: #F5E642;
      --yellow-dim: #E8D800;
      --green: #4CD97B;
      --pink: #FF8FAB;
      --blue: #7EC8FF;
      --orange: #FFB347;
      --purple: #C9A0FF;
      --red: #FF6B6B;
      --white: #FFFFFF;
      --text1: #FFFFFF;
      --text2: #AAAAAA;
      --text3: #555555;
      --border: #2A2A2A;
      --card-radius: 18px;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
    body {
      background: var(--bg);
      color: var(--text1);
      font-family: 'Pretendard', -apple-system, sans-serif;
      max-width: 430px;
      margin: 0 auto;
      min-height: 100vh;
      overflow-x: hidden;
    }

    /* ── 헤더 ── */
    .header {
      padding: 52px 20px 16px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .header-title {
      font-size: 26px;
      font-weight: 800;
      color: var(--white);
      letter-spacing: -0.5px;
    }
    .header-title span { color: var(--yellow); }
    .header-badge {
      background: var(--bg3);
      color: var(--text2);
      font-size: 12px;
      font-weight: 600;
      padding: 5px 12px;
      border-radius: 20px;
      border: 1px solid var(--border);
    }

    /* ── 검색 ── */
    .search-wrap {
      margin: 0 20px 16px;
      background: var(--bg2);
      border-radius: 14px;
      border: 1px solid var(--border);
      display: flex;
      align-items: center;
      padding: 12px 16px;
      gap: 10px;
    }
    .search-icon { color: var(--text3); font-size: 16px; flex: 0 0 auto; }
    .search-wrap input {
      flex: 1;
      background: transparent;
      border: none;
      outline: none;
      font-size: 15px;
      font-family: 'Pretendard', sans-serif;
      color: var(--text1);
      font-weight: 500;
    }
    .search-wrap input::placeholder { color: var(--text3); }
    .recent-search-dropdown {
      display: none;
      position: absolute;
      top: calc(100% + 6px);
      left: 0; right: 0;
      background: var(--bg2);
      border: 1px solid var(--border);
      border-radius: 14px;
      z-index: 100;
      overflow: hidden;
    }
    .recent-item {
      padding: 12px 16px;
      display: flex;
      align-items: center;
      gap: 10px;
      cursor: pointer;
      border-bottom: 1px solid var(--border);
    }
    .recent-item:last-child { border-bottom: none; }
    .recent-item:active { background: var(--bg3); }
    .recent-search-icon { font-size: 13px; color: var(--text3); }
    .recent-item span { font-size: 14px; color: var(--text2); flex: 1; }
    .recent-del { font-size: 12px; color: var(--text3); padding: 2px 6px; }

    /* ── 카테고리 칩 ── */
    .cat-row {
      display: flex;
      gap: 8px;
      padding: 0 20px 16px;
      overflow-x: auto;
      scrollbar-width: none;
    }
    .cat-row::-webkit-scrollbar { display: none; }
    .cat-chip {
      flex: 0 0 auto;
      padding: 8px 16px;
      border-radius: 20px;
      font-size: 13px;
      font-weight: 600;
      font-family: 'Pretendard', sans-serif;
      cursor: pointer;
      border: 1.5px solid var(--border);
      background: var(--bg2);
      color: var(--text2);
      transition: all 0.15s ease;
      white-space: nowrap;
    }
    .cat-chip.active {
      background: var(--yellow);
      color: #111111;
      border-color: var(--yellow);
    }

    /* ── 스크롤 영역 ── */
    .scroll-area {
      padding: 0 20px;
      padding-bottom: 100px;
    }
    .result-count {
      font-size: 12px;
      color: var(--text3);
      font-weight: 600;
      margin-bottom: 12px;
      letter-spacing: 0.3px;
    }

    /* ── 연락처 카드 ── */
    .contact-card {
      background: var(--bg2);
      border: 1px solid var(--border);
      border-radius: var(--card-radius);
      padding: 14px 14px;
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 10px;
      cursor: pointer;
      transition: all 0.15s ease;
      position: relative;
    }
    .contact-card:active { transform: scale(0.98); background: var(--bg3); }

    .contact-icon {
      width: 48px; height: 48px;
      border-radius: 14px;
      display: flex; align-items: center; justify-content: center;
      font-size: 11px;
      font-weight: 800;
      flex: 0 0 auto;
      position: relative;
      letter-spacing: -0.5px;
      overflow: hidden;
    }
    .contact-icon img.logo-img {
      width: 34px; height: 34px;
      object-fit: contain;
      border-radius: 6px;
    }
    .open-dot {
      position: absolute;
      bottom: -1px; right: -1px;
      width: 9px; height: 9px;
      border-radius: 50%;
      border: 2px solid var(--bg2);
    }
    .open-dot.open { background: var(--green); }
    .open-dot.closed { background: var(--red); }

    .contact-info { flex: 1; min-width: 0; }
    .contact-name {
      font-size: 14px;
      font-weight: 700;
      color: var(--text1);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      margin-bottom: 3px;
    }
    .contact-sub {
      font-size: 11px;
      color: var(--text3);
      font-weight: 500;
      margin-bottom: 4px;
    }
    .contact-tel {
      font-size: 13px;
      color: var(--yellow);
      font-weight: 700;
      letter-spacing: 0.3px;
    }

    .call-btn {
      width: 42px; height: 42px;
      background: var(--yellow);
      border-radius: 12px;
      display: flex; align-items: center; justify-content: center;
      text-decoration: none;
      flex: 0 0 auto;
      transition: all 0.15s ease;
    }
    .call-btn:active { transform: scale(0.92); background: var(--yellow-dim); }
    .call-btn-icon { font-size: 18px; filter: brightness(0); }

    .fav-btn {
      background: transparent;
      border: none;
      font-size: 18px;
      cursor: pointer;
      padding: 4px;
      flex: 0 0 auto;
      color: var(--text3);
      transition: all 0.15s ease;
    }
    .fav-btn.active { color: var(--yellow); }

    /* ── 빈 상태 ── */
    .empty-state {
      text-align: center;
      padding: 60px 20px;
    }
    .empty-icon { font-size: 40px; margin-bottom: 12px; }
    .empty-title { font-size: 16px; font-weight: 700; color: var(--text2); margin-bottom: 6px; }
    .empty-sub { font-size: 13px; color: var(--text3); }

    /* ── 탭바 ── */
    .tab-bar {
      position: fixed;
      bottom: 0; left: 50%;
      transform: translateX(-50%);
      width: 100%; max-width: 430px;
      background: var(--bg);
      border-top: 1px solid var(--border);
      display: flex;
      padding: 8px 0 24px;
      z-index: 200;
    }
    .tab-btn {
      flex: 1;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      gap: 4px;
      background: none; border: none;
      cursor: pointer;
      padding: 6px 0;
      font-family: 'Pretendard', sans-serif;
    }
    .tab-icon {
      font-size: 22px;
      display: flex; align-items: center; justify-content: center;
      width: 36px; height: 36px;
      border-radius: 10px;
      transition: all 0.15s ease;
    }
    .tab-btn.active .tab-icon {
      background: var(--yellow);
    }
    .tab-label {
      font-size: 10px;
      font-weight: 600;
      color: var(--text3);
      transition: color 0.15s;
    }
    .tab-btn.active .tab-label { color: var(--yellow); }

    /* ── 히스토리 카드 ── */
    .history-card {
      background: var(--bg2);
      border: 1px solid var(--border);
      border-radius: var(--card-radius);
      padding: 14px 16px;
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 10px;
    }
    .history-icon {
      width: 40px; height: 40px;
      background: var(--bg3);
      border-radius: 12px;
      display: flex; align-items: center; justify-content: center;
      font-size: 18px;
      flex: 0 0 auto;
    }
    .history-name { font-size: 14px; font-weight: 700; color: var(--text1); }
    .history-meta { font-size: 12px; color: var(--text3); margin-top: 3px; }

    /* ── 모달 ── */
    .modal-overlay {
      display: none;
      position: fixed; inset: 0;
      background: rgba(0,0,0,0.7);
      z-index: 500;
      backdrop-filter: blur(4px);
    }
    .modal-overlay.open { display: flex; align-items: flex-end; }
    .modal-sheet {
      background: var(--bg2);
      border-radius: 24px 24px 0 0;
      width: 100%; max-width: 430px;
      margin: 0 auto;
      padding: 20px 20px 40px;
      border-top: 1px solid var(--border);
    }
    .modal-handle {
      width: 36px; height: 4px;
      background: var(--border);
      border-radius: 2px;
      margin: 0 auto 20px;
    }
    .modal-icon-wrap {
      width: 64px; height: 64px;
      border-radius: 18px;
      display: flex; align-items: center; justify-content: center;
      margin: 0 auto 16px;
      font-size: 14px;
      font-weight: 800;
    }
    .modal-name {
      font-size: 20px;
      font-weight: 800;
      text-align: center;
      margin-bottom: 4px;
    }
    .modal-cat {
      font-size: 13px;
      color: var(--text3);
      text-align: center;
      margin-bottom: 20px;
    }
    .modal-row {
      display: flex; align-items: center; gap: 12px;
      padding: 14px 0;
      border-bottom: 1px solid var(--border);
    }
    .modal-row:last-of-type { border-bottom: none; }
    .modal-row-icon { font-size: 18px; flex: 0 0 auto; }
    .modal-row-label { font-size: 13px; color: var(--text3); flex: 0 0 auto; width: 60px; }
    .modal-row-val { font-size: 14px; font-weight: 600; color: var(--text1); flex: 1; }
    .modal-row-val.tel { color: var(--yellow); font-size: 17px; font-weight: 700; }
    .modal-call-btn {
      display: flex; align-items: center; justify-content: center; gap: 8px;
      background: var(--yellow);
      color: #111;
      border: none;
      border-radius: 16px;
      width: 100%;
      padding: 16px;
      font-size: 16px;
      font-weight: 800;
      font-family: 'Pretendard', sans-serif;
      cursor: pointer;
      margin-top: 20px;
      text-decoration: none;
      transition: all 0.15s ease;
    }
    .modal-call-btn:active { transform: scale(0.97); background: var(--yellow-dim); }

    /* 섹션 헤더 */
    .section-header {
      font-size: 13px;
      font-weight: 700;
      color: var(--text3);
      letter-spacing: 0.5px;
      text-transform: uppercase;
      margin: 20px 0 10px;
    }
  </style>
</head>
<body>

  <!-- 헤더 -->
  <div class="header">
    <div class="header-title">바로<span>연락</span></div>
    <div class="header-badge" id="totalBadge">— 개</div>
  </div>

  <!-- 검색 -->
  <div style="position:relative; margin: 0 20px 16px;">
    <div class="search-wrap" id="searchWrap">
      <span class="search-icon">🔍</span>
      <input type="text" id="searchInput" placeholder="기관명, 번호, 서비스 검색..." autocomplete="off" />
      <div class="recent-search-dropdown" id="recentDropdown"></div>
    </div>
  </div>

  <!-- 카테고리 칩 -->
  <div class="cat-row" id="catRow"></div>

  <!-- 스크롤 영역 -->
  <div class="scroll-area" id="scrollArea">
    <div class="result-count" id="resultCount"></div>
    <div id="listWrap"></div>
  </div>

  <!-- 탭바 -->
  <div class="tab-bar">
    <button class="tab-btn active" id="tabAll" onclick="switchTab('all')">
      <span class="tab-icon">📋</span>
      <span class="tab-label">전체</span>
    </button>
    <button class="tab-btn" id="tabFav" onclick="switchTab('fav')">
      <span class="tab-icon">⭐</span>
      <span class="tab-label">즐겨찾기</span>
    </button>
    <button class="tab-btn" id="tabHistory" onclick="switchTab('history')">
      <span class="tab-icon">🕐</span>
      <span class="tab-label">최근통화</span>
    </button>
  </div>

  <!-- 상세 모달 -->
  <div class="modal-overlay" id="modalOverlay" onclick="closeModal(event)">
    <div class="modal-sheet" id="modalSheet">
      <div class="modal-handle"></div>
      <div id="modalContent"></div>
    </div>
  </div>

<script>
// ── 카테고리 컬러 맵 ──
const CAT_COLORS = {
  '긴급':       { bg: '#FF6B6B', text: '#fff' },
  '공공기관':   { bg: '#7EC8FF', text: '#111' },
  '관공서':     { bg: '#7EC8FF', text: '#111' },
  '통신':       { bg: '#C9A0FF', text: '#fff' },
  '금융':       { bg: '#4CD97B', text: '#111' },
  'IT/전자':    { bg: '#7EC8FF', text: '#111' },
  '전자제품':   { bg: '#7EC8FF', text: '#111' },
  '택배/물류':  { bg: '#FFB347', text: '#111' },
  '쇼핑':       { bg: '#FF8FAB', text: '#fff' },
  '항공/여행':  { bg: '#7EC8FF', text: '#111' },
  '자동차':     { bg: '#4CD97B', text: '#111' },
  '외국계기업': { bg: '#C9A0FF', text: '#fff' },
  '유통':       { bg: '#FFB347', text: '#111' },
  '식품':       { bg: '#4CD97B', text: '#111' },
  '에너지':     { bg: '#FFB347', text: '#111' },
  '대기업':     { bg: '#AAAAAA', text: '#111' },
  '반려동물':   { bg: '#FF8FAB', text: '#fff' },
  '법률':       { bg: '#C9A0FF', text: '#fff' },
  '법률/세무':  { bg: '#C9A0FF', text: '#fff' },
  '부동산':     { bg: '#FFB347', text: '#111' },
  '의료':       { bg: '#FF6B6B', text: '#fff' },
  '교육':       { bg: '#F5E642', text: '#111' },
  '육아/교육':  { bg: '#F5E642', text: '#111' },
  '지자체':     { bg: '#7EC8FF', text: '#111' },
  '명품':       { bg: '#F5E642', text: '#111' },
};

const CAT_ICONS = {
  '긴급': '🚨', '관공서': '🏛️', '공공기관': '🏢',
  '통신': '📱', '금융': '💳', 'IT/전자': '💻',
  '전자제품': '📺', '택배/물류': '📦', '쇼핑': '🛒',
  '항공/여행': '✈️', '자동차': '🚗', '외국계기업': '🌍',
  '유통': '🏪', '식품': '🍽️', '에너지': '⚡',
  '대기업': '🏢', '반려동물': '🐾', '법률': '⚖️',
  '법률/세무': '⚖️', '부동산': '🏠', '의료': '🏥',
  '교육': '📚', '육아/교육': '👶', '지자체': '🏙️',
  '명품': '👜',
};

function getInitial(name) {
  const engMatch = name.match(/[A-Z]{2,4}/);
  if (engMatch) return engMatch[0];
  const cleaned = name.replace(/\s*(고객센터|서비스센터|콜센터|상담센터|코리아|korea).*$/i, '').trim();
  if (cleaned.length <= 4) return cleaned;
  return cleaned.slice(0, 2);
}

function renderIcon(c, size = 48, radius = 14) {
  const col = CAT_COLORS[c.category] || { bg: '#333', text: '#fff' };
  const initial = getInitial(c.name);
  const fontSize = initial.length > 2 ? '10px' : '12px';
  if (c.domain) {
    return `<div class="contact-icon" style="background:${col.bg};border-radius:${radius}px;width:${size}px;height:${size}px;">
      <img class="logo-img" src="https://logo.clearbit.com/${c.domain}?size=68" alt="" onerror="this.style.display='none';this.nextSibling.style.display='flex'" style="width:32px;height:32px;border-radius:6px;object-fit:contain"/>
      <span style="display:none;font-size:${fontSize};font-weight:800;color:${col.text};letter-spacing:-0.5px;text-align:center">${initial}</span>
    </div>`;
  }
  return `<div class="contact-icon" style="background:${col.bg};border-radius:${radius}px;width:${size}px;height:${size}px;font-size:${fontSize};color:${col.text}">
    ${initial || (CAT_ICONS[c.category] || '📞')}
  </div>`;
}

// ── 운영시간 체크 ──
function isOpen(hours) {
  if (!hours) return null;
  if (hours.includes('24')) return true;
  if (hours.includes('평일')) {
    const now = new Date();
    const day = now.getDay();
    if (day === 0 || day === 6) return false;
    const totalMin = now.getHours() * 60 + now.getMinutes();
    return totalMin >= 9 * 60 && totalMin < 18 * 60;
  }
  return null;
}

// ── 스토리지 ──
const FAV_KEY = 'baro-fav-v1';
const HISTORY_KEY = 'baro-history-v1';
const RECENT_KEY = 'baro-recent-search-v1';
const getFavs = () => JSON.parse(localStorage.getItem(FAV_KEY) || '[]');
const isFav = id => getFavs().includes(id);
const getHistory = () => JSON.parse(localStorage.getItem(HISTORY_KEY) || '[]');
const getRecent = () => JSON.parse(localStorage.getItem(RECENT_KEY) || '[]');

function toggleFav(e, id) {
  e.stopPropagation();
  let favs = getFavs();
  if (favs.includes(id)) favs = favs.filter(x => x !== id);
  else favs.unshift(id);
  localStorage.setItem(FAV_KEY, JSON.stringify(favs));
  renderList();
}

function recordCall(id) {
  let h = getHistory();
  h = h.filter(x => x.id !== id);
  h.unshift({ id, ts: Date.now() });
  if (h.length > 50) h = h.slice(0, 50);
  localStorage.setItem(HISTORY_KEY, JSON.stringify(h));
}

// ── 탭/필터 상태 ──
let currentTab = 'all';
let currentCat = 'ALL';
let allData = [];

function switchTab(tab) {
  currentTab = tab;
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
  document.getElementById('tab' + tab.charAt(0).toUpperCase() + tab.slice(1)).classList.add('active');
  renderList();
}

// ── 카테고리 칩 렌더 ──
function renderCats(data) {
  const cats = ['ALL', ...new Set(data.map(c => c.category))];
  const row = document.getElementById('catRow');
  row.innerHTML = cats.map(cat => `
    <button class="cat-chip ${cat === currentCat ? 'active' : ''}" onclick="selectCat('${cat}')">
      ${cat === 'ALL' ? '🔍 전체' : (CAT_ICONS[cat] || '') + ' ' + cat}
    </button>`).join('');
}

function selectCat(cat) {
  currentCat = cat;
  renderCats(allData);
  renderList();
}

// ── 리스트 렌더 ──
function renderList() {
  const q = document.getElementById('searchInput').value.trim().toLowerCase();
  let data = allData;

  if (currentTab === 'fav') {
    const favs = getFavs();
    data = data.filter(c => favs.includes(c.id));
  } else if (currentTab === 'history') {
    renderHistory();
    return;
  }

  if (currentCat !== 'ALL') data = data.filter(c => c.category === currentCat);
  if (q) data = data.filter(c =>
    c.name.toLowerCase().includes(q) ||
    c.tel.includes(q) ||
    (c.subcategory || '').toLowerCase().includes(q) ||
    c.category.toLowerCase().includes(q)
  );

  const wrap = document.getElementById('listWrap');
  const count = document.getElementById('resultCount');
  count.textContent = `${data.length}개 결과`;

  if (!data.length) {
    wrap.innerHTML = `<div class="empty-state">
      <div class="empty-icon">${currentTab === 'fav' ? '⭐' : '🔍'}</div>
      <div class="empty-title">${currentTab === 'fav' ? '즐겨찾기가 없어요' : '검색 결과가 없어요'}</div>
      <div class="empty-sub">${currentTab === 'fav' ? '자주 쓰는 번호를 추가해보세요' : '다른 검색어를 시도해보세요'}</div>
    </div>`;
    return;
  }

  const openStatus = c => isOpen(c.hours);
  const dot = c => {
    const s = openStatus(c);
    if (s === null) return '';
    return `<div class="open-dot ${s ? 'open' : 'closed'}"></div>`;
  };

  wrap.innerHTML = data.map(c => `
    <div class="contact-card" onclick="openDetail('${c.id}')">
      <div style="position:relative;flex:0 0 auto">
        ${renderIcon(c)}
        ${dot(c)}
      </div>
      <div class="contact-info">
        <div class="contact-name">${c.name}</div>
        <div class="contact-sub">${c.category} · ${c.subcategory || ''}</div>
        <div class="contact-tel">${c.tel}</div>
      </div>
      <button class="fav-btn ${isFav(c.id) ? 'active' : ''}" onclick="toggleFav(event,'${c.id}')">${isFav(c.id) ? '⭐' : '☆'}</button>
      <a class="call-btn" href="tel:${c.tel.replace(/[^0-9+]/g,'')}" onclick="event.stopPropagation();recordCall('${c.id}')">
        <span class="call-btn-icon">📞</span>
      </a>
    </div>`).join('');
}

function renderHistory() {
  const h = getHistory();
  const wrap = document.getElementById('listWrap');
  const count = document.getElementById('resultCount');

  if (!h.length) {
    count.textContent = '';
    wrap.innerHTML = `<div class="empty-state">
      <div class="empty-icon">📋</div>
      <div class="empty-title">최근 통화 기록이 없어요</div>
      <div class="empty-sub">전화를 걸면 여기에 기록돼요</div>
    </div>`;
    return;
  }

  count.textContent = `${h.length}개 기록`;
  wrap.innerHTML = h.map(item => {
    const c = allData.find(x => x.id === item.id);
    if (!c) return '';
    const d = new Date(item.ts);
    const timeStr = d.toLocaleDateString('ko-KR', { month: 'short', day: 'numeric' }) + ' ' +
      d.toLocaleTimeString('ko-KR', { hour: '2-digit', minute: '2-digit' });
    return `<div class="history-card">
      <div class="history-icon">📞</div>
      <div style="flex:1;min-width:0">
        <div class="history-name">${c.name}</div>
        <div class="history-meta">${c.tel} · ${timeStr}</div>
      </div>
      <a class="call-btn" href="tel:${c.tel.replace(/[^0-9+]/g,'')}" onclick="recordCall('${c.id}')">
        <span class="call-btn-icon">📞</span>
      </a>
    </div>`;
  }).join('');
}

// ── 상세 모달 ──
function openDetail(id) {
  const c = allData.find(x => x.id === id);
  if (!c) return;
  const col = CAT_COLORS[c.category] || { bg: '#333', text: '#fff' };
  const openStatus = isOpen(c.hours);
  const statusText = openStatus === null ? '' : openStatus ? '🟢 운영중' : '🔴 운영종료';

  document.getElementById('modalContent').innerHTML = `
    <div class="modal-icon-wrap" style="background:${col.bg}">
      <span style="font-size:13px;font-weight:800;color:${col.text};letter-spacing:-0.5px">${getInitial(c.name)}</span>
    </div>
    <div class="modal-name">${c.name}</div>
    <div class="modal-cat">${c.category} · ${c.subcategory || ''} ${statusText}</div>
    <div class="modal-row">
      <span class="modal-row-icon">📞</span>
      <span class="modal-row-label">전화번호</span>
      <span class="modal-row-val tel">${c.tel}</span>
    </div>
    ${c.ars ? `<div class="modal-row">
      <span class="modal-row-icon">🔢</span>
      <span class="modal-row-label">ARS</span>
      <span class="modal-row-val">${c.ars}</span>
    </div>` : ''}
    <div class="modal-row">
      <span class="modal-row-icon">🕐</span>
      <span class="modal-row-label">운영시간</span>
      <span class="modal-row-val">${c.hours || '정보없음'}</span>
    </div>
    <a class="modal-call-btn" href="tel:${c.tel.replace(/[^0-9+]/g,'')}" onclick="recordCall('${c.id}')">
      📞 바로 전화하기
    </a>
  `;
  document.getElementById('modalOverlay').classList.add('open');
}

function closeModal(e) {
  if (e.target === document.getElementById('modalOverlay')) {
    document.getElementById('modalOverlay').classList.remove('open');
  }
}

// ── 검색 ──
document.getElementById('searchInput').addEventListener('input', () => {
  renderList();
});

// ── 데이터 로드 ──
fetch('contacts_v1.json?v=' + Date.now())
  .then(r => r.json())
  .then(data => {
    allData = data;
    document.getElementById('totalBadge').textContent = data.length + '개';
    renderCats(data);
    renderList();
  });
</script>
</body>
</html>
