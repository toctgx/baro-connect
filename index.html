<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>바로연결 — 고객센터 즉시 찾기</title>
  <link href="https://fonts.googleapis.com/css2?family=Pretendard:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --primary: #1a73e8;
      --red: #ea4335;
      --green: #34a853;
      --bg: #f5f6fa;
      --card: #ffffff;
      --border: #e8eaed;
      --text: #1a1a2e;
      --sub: #80868b;
    }
    html, body { height: 100%; font-family: 'Pretendard', sans-serif; background: var(--bg); color: var(--text); overflow: hidden; }
    .app { display: flex; flex-direction: column; height: 100dvh; }

    /* 헤더 */
    .header {
      flex: 0 0 auto;
      background: var(--primary);
      padding: 14px 16px 10px;
    }
    .header-title { color: #fff; font-size: 20px; font-weight: 800; letter-spacing: -0.5px; }
    .header-sub { color: rgba(255,255,255,0.75); font-size: 12px; margin-top: 2px; }
    .search-wrap {
      margin-top: 10px;
      display: flex;
      align-items: center;
      background: #fff;
      border-radius: 12px;
      padding: 0 12px;
      gap: 8px;
      height: 42px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.15);
      position: relative;
    }
    .search-wrap input {
      flex: 1; border: none; outline: none;
      font-size: 14px; font-family: inherit; color: var(--text);
    }
    .search-wrap input::placeholder { color: #aaa; }
    .search-icon { font-size: 16px; color: #aaa; }

    /* 최근 검색어 드롭다운 */
    .recent-search-dropdown {
      display: none;
      position: absolute;
      top: calc(100% + 4px);
      left: 0; right: 0;
      background: #fff;
      border-radius: 12px;
      box-shadow: 0 4px 16px rgba(0,0,0,0.15);
      z-index: 100;
      overflow: hidden;
    }
    .recent-search-dropdown.show { display: block; }
    .recent-search-header {
      font-size: 11px;
      color: var(--sub);
      font-weight: 600;
      padding: 10px 14px 6px;
    }
    .recent-search-item {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 9px 14px;
      cursor: pointer;
      font-size: 13px;
      color: var(--text);
      transition: background 0.1s;
    }
    .recent-search-item:hover { background: var(--bg); }
    .recent-search-icon { font-size: 13px; color: var(--sub); }
    .recent-search-del {
      margin-left: auto;
      font-size: 14px;
      color: #ccc;
      background: none;
      border: none;
      cursor: pointer;
      padding: 0 2px;
    }

    /* 카테고리 탭 */
    .cat-row {
      flex: 0 0 auto;
      display: flex;
      gap: 6px;
      padding: 10px 12px;
      overflow-x: auto;
      scrollbar-width: none;
      background: var(--card);
      border-bottom: 1px solid var(--border);
    }
    .cat-row::-webkit-scrollbar { display: none; }
    .cat-chip {
      flex: 0 0 auto;
      padding: 5px 12px;
      border-radius: 20px;
      font-size: 12px;
      font-weight: 600;
      border: 1.5px solid var(--border);
      color: var(--sub);
      background: var(--card);
      cursor: pointer;
      font-family: inherit;
      white-space: nowrap;
      transition: all 0.15s;
    }
    .cat-chip.active { background: var(--primary); border-color: var(--primary); color: #fff; }

    /* 스크롤 영역 */
    .scroll-area {
      flex: 1 1 auto;
      overflow-y: auto;
      padding: 10px 12px;
      -webkit-overflow-scrolling: touch;
    }

    /* 결과 카운트 */
    .result-count {
      font-size: 12px;
      color: var(--sub);
      margin-bottom: 8px;
      padding: 0 2px;
    }

    /* 연락처 카드 */
    .contact-card {
      background: var(--card);
      border-radius: 12px;
      padding: 14px;
      margin-bottom: 8px;
      border: 1px solid var(--border);
      display: flex;
      align-items: center;
      gap: 12px;
      cursor: pointer;
      transition: box-shadow 0.15s;
      position: relative;
    }
    .contact-card:active { box-shadow: 0 2px 12px rgba(0,0,0,0.1); }
    .contact-icon {
      width: 42px; height: 42px;
      border-radius: 12px;
      display: flex; align-items: center; justify-content: center;
      font-size: 20px;
      flex: 0 0 auto;
      position: relative;
    }
    /* 운영 상태 도트 */
    .open-dot {
      position: absolute;
      bottom: -2px; right: -2px;
      width: 10px; height: 10px;
      border-radius: 50%;
      border: 2px solid #fff;
    }
    .open-dot.open { background: var(--green); }
    .open-dot.closed { background: var(--red); }

    .contact-info { flex: 1; min-width: 0; }
    .contact-name { font-size: 14px; font-weight: 700; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .contact-sub { font-size: 11px; color: var(--sub); margin-top: 2px; }
    .contact-tel { font-size: 13px; font-weight: 700; color: var(--primary); margin-top: 3px; }
    .call-btn {
      flex: 0 0 auto;
      width: 40px; height: 40px;
      border-radius: 50%;
      background: var(--green);
      border: none;
      cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      font-size: 18px;
      box-shadow: 0 2px 8px rgba(52,168,83,0.3);
      transition: transform 0.1s;
      text-decoration: none;
    }
    .call-btn:active { transform: scale(0.92); }

    /* 상세 모달 */
    .modal-backdrop {
      display: none;
      position: fixed; inset: 0;
      background: rgba(0,0,0,0.5);
      z-index: 200;
      align-items: flex-end;
    }
    .modal-backdrop.show { display: flex; }
    .modal {
      background: var(--card);
      border-radius: 20px 20px 0 0;
      padding: 20px;
      width: 100%;
      max-height: 70vh;
      overflow-y: auto;
    }
    .modal-handle { width: 36px; height: 4px; background: var(--border); border-radius: 2px; margin: 0 auto 16px; }
    .modal-name { font-size: 18px; font-weight: 800; margin-bottom: 4px; }
    .modal-cat { font-size: 12px; color: var(--sub); margin-bottom: 16px; }
    .modal-row { display: flex; align-items: flex-start; gap: 10px; margin-bottom: 12px; padding: 12px; background: var(--bg); border-radius: 10px; }
    .modal-row-icon { font-size: 18px; flex: 0 0 auto; margin-top: 1px; }
    .modal-row-label { font-size: 11px; color: var(--sub); font-weight: 600; }
    .modal-row-val { font-size: 14px; font-weight: 700; margin-top: 2px; }
    .modal-call-btn {
      width: 100%;
      padding: 15px;
      background: var(--green);
      color: #fff;
      border: none;
      border-radius: 14px;
      font-size: 16px;
      font-weight: 800;
      cursor: pointer;
      font-family: inherit;
      margin-top: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      text-decoration: none;
    }
    .ars-tip {
      background: #fff8e1;
      border-radius: 10px;
      padding: 10px 12px;
      font-size: 12px;
      color: #e65100;
      margin-top: 8px;
      line-height: 1.6;
    }
    .hours-badge {
      display: inline-block;
      padding: 3px 8px;
      border-radius: 20px;
      font-size: 11px;
      font-weight: 700;
    }
    .hours-24 { background: #e8f5e9; color: #2e7d32; }
    .hours-weekday { background: #e3f2fd; color: #1565c0; }

    /* 빈 상태 */
    .empty { display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 60px 0; color: var(--sub); font-size: 13px; gap: 8px; }
    .empty-icon { font-size: 40px; }

    /* 하단 탭바 — 4개 */
    .tab-bar {
      flex: 0 0 auto;
      background: var(--card);
      border-top: 1px solid var(--border);
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      padding: 6px 0 max(6px, env(safe-area-inset-bottom));
    }
    .tab-btn {
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      gap: 2px; font-size: 10px; font-weight: 600; color: var(--sub);
      border: none; background: none; cursor: pointer; font-family: inherit; padding: 4px 0;
    }
    .tab-btn.active { color: var(--primary); }
    .tab-icon { font-size: 20px; }

    /* 즐겨찾기 버튼 */
    .fav-btn {
      position: absolute; top: 12px; right: 12px;
      background: none; border: none; font-size: 18px; cursor: pointer; padding: 4px;
    }

    /* ===== 번호 제보 모달 ===== */
    .report-backdrop {
      display: none;
      position: fixed; inset: 0;
      background: rgba(0,0,0,0.5);
      z-index: 300;
      align-items: flex-end;
    }
    .report-backdrop.show { display: flex; }
    .report-modal {
      background: var(--card);
      border-radius: 20px 20px 0 0;
      padding: 20px;
      width: 100%;
      max-height: 85vh;
      overflow-y: auto;
      animation: slideUp 0.3s ease;
    }
    @keyframes slideUp {
      from { transform: translateY(100%); }
      to { transform: translateY(0); }
    }
    .report-modal h2 {
      font-size: 18px; font-weight: 800; margin-bottom: 4px;
    }
    .report-modal p {
      font-size: 13px; color: var(--sub); margin-bottom: 18px;
    }
    .form-group {
      margin-bottom: 14px;
    }
    .form-group label {
      display: block;
      font-size: 12px; font-weight: 600; color: var(--sub);
      margin-bottom: 6px;
    }
    .form-group input,
    .form-group select,
    .form-group textarea {
      width: 100%;
      padding: 11px 12px;
      border: 1.5px solid var(--border);
      border-radius: 10px;
      font-size: 14px;
      font-family: inherit;
      color: var(--text);
      background: var(--bg);
      outline: none;
      transition: border-color 0.15s;
    }
    .form-group input:focus,
    .form-group select:focus,
    .form-group textarea:focus {
      border-color: var(--primary);
      background: #fff;
    }
    .form-group textarea { resize: none; height: 80px; }
    .report-submit-btn {
      width: 100%;
      padding: 15px;
      background: var(--primary);
      color: #fff;
      border: none;
      border-radius: 14px;
      font-size: 16px;
      font-weight: 800;
      cursor: pointer;
      font-family: inherit;
      margin-top: 8px;
    }
    .report-close-btn {
      display: block;
      width: 100%;
      padding: 12px;
      background: none;
      border: none;
      color: var(--sub);
      font-size: 14px;
      font-family: inherit;
      cursor: pointer;
      margin-top: 6px;
    }

    /* 토스트 */
    .toast {
      position: fixed;
      bottom: 90px;
      left: 50%;
      transform: translateX(-50%) translateY(20px);
      background: #333;
      color: #fff;
      padding: 10px 20px;
      border-radius: 24px;
      font-size: 13px;
      font-weight: 600;
      opacity: 0;
      transition: all 0.3s;
      z-index: 500;
      white-space: nowrap;
    }
    .toast.show {
      opacity: 1;
      transform: translateX(-50%) translateY(0);
    }

    /* 최근 통화 히스토리 카드 */
    .history-card {
      background: var(--card);
      border-radius: 12px;
      padding: 14px;
      margin-bottom: 8px;
      border: 1px solid var(--border);
      display: flex;
      align-items: center;
      gap: 12px;
    }
    .history-icon {
      width: 42px; height: 42px;
      border-radius: 12px;
      background: #e8f5e9;
      display: flex; align-items: center; justify-content: center;
      font-size: 20px;
      flex: 0 0 auto;
    }
    .history-info { flex: 1; min-width: 0; }
    .history-name { font-size: 14px; font-weight: 700; }
    .history-tel { font-size: 13px; color: var(--primary); font-weight: 600; margin-top: 2px; }
    .history-time { font-size: 11px; color: var(--sub); margin-top: 2px; }
    .history-call-btn {
      flex: 0 0 auto;
      width: 40px; height: 40px;
      border-radius: 50%;
      background: var(--green);
      border: none;
      display: flex; align-items: center; justify-content: center;
      font-size: 18px;
      text-decoration: none;
      box-shadow: 0 2px 8px rgba(52,168,83,0.3);
    }
  </style>
</head>
<body>
<div class="app">
  <div class="header">
    <div class="header-title">📞 바로연결</div>
    <div class="header-sub">고객센터 번호 즉시 찾기</div>
    <div class="search-wrap" id="searchWrap">
      <span class="search-icon">🔍</span>
      <input type="text" id="searchInput" placeholder="기관명, 번호, 서비스 검색..." autocomplete="off" />
      <div class="recent-search-dropdown" id="recentDropdown"></div>
    </div>
  </div>

  <div class="cat-row" id="catRow"></div>

  <div class="scroll-area" id="scrollArea">
    <div class="result-count" id="resultCount"></div>
    <div id="contactList"></div>
    <div style="height:16px;"></div>
  </div>

  <div class="tab-bar">
    <button class="tab-btn active" data-tab="home" onclick="showTab('home')">
      <span class="tab-icon">🏠</span>전체
    </button>
    <button class="tab-btn" data-tab="fav" onclick="showTab('fav')">
      <span class="tab-icon">⭐</span>즐겨찾기
    </button>
    <button class="tab-btn" data-tab="history" onclick="showTab('history')">
      <span class="tab-icon">📋</span>최근통화
    </button>
    <button class="tab-btn" data-tab="suggest" onclick="showTab('suggest')">
      <span class="tab-icon">➕</span>번호제보
    </button>
  </div>
</div>

<!-- 상세 모달 -->
<div class="modal-backdrop" id="modalBackdrop" onclick="closeModal(event)">
  <div class="modal" id="modal">
    <div class="modal-handle"></div>
    <div id="modalContent"></div>
  </div>
</div>

<!-- 번호 제보 모달 -->
<div class="report-backdrop" id="reportBackdrop" onclick="closeReport(event)">
  <div class="report-modal" id="reportModal">
    <div class="modal-handle"></div>
    <h2>번호 제보하기</h2>
    <p>없는 번호를 알려주시면 검토 후 추가할게요!</p>

    <div class="form-group">
      <label>기관/기업명 *</label>
      <input type="text" id="reportName" placeholder="예: 국민건강보험공단" />
    </div>
    <div class="form-group">
      <label>전화번호 *</label>
      <input type="tel" id="reportTel" placeholder="예: 1588-1234" />
    </div>
    <div class="form-group">
      <label>카테고리 *</label>
      <select id="reportCat">
        <option value="">선택하세요</option>
        <option>관공서</option>
        <option>공공기관</option>
        <option>금융</option>
        <option>IT전자</option>
        <option>쇼핑</option>
        <option>택배</option>
        <option>항공</option>
        <option>자동차</option>
        <option>외국계기업</option>
        <option>대기업</option>
        <option>지자체</option>
        <option>의료</option>
        <option>교육</option>
        <option>법률</option>
        <option>기타</option>
      </select>
    </div>
    <div class="form-group">
      <label>ARS 단축번호 안내 <span style="color:#aaa;font-weight:400;">(선택)</span></label>
      <textarea id="reportArs" placeholder="예: 1번 상담원 연결, 2번 청구서 문의..."></textarea>
    </div>

    <button class="report-submit-btn" onclick="submitReport()">제보하기</button>
    <button class="report-close-btn" onclick="closeReportModal()">닫기</button>
  </div>
</div>

<!-- 토스트 -->
<div class="toast" id="toast"></div>

<script>
let allContacts = [];
let favorites = JSON.parse(localStorage.getItem('baro-favorites') || '[]');
let callHistory = JSON.parse(localStorage.getItem('baro-callhistory') || '[]');
let recentSearches = JSON.parse(localStorage.getItem('baro-recentsearch') || '[]');
let currentCat = 'ALL';
let currentTab = 'home';
let searchQ = '';

const CAT_ICONS = {
  '긴급': '🚨',
  '관공서': '🏛️',
  '공공기관': '🏢',
  '통신': '📱',
  '금융': '💳',
  'IT/전자': '💻',
  '택배/물류': '📦',
  '쇼핑': '🛒',
  '항공/여행': '✈️',
  '자동차': '🚗',
  '외국계기업': '🌍',
  '유통': '🏪',
  '식품': '🍽️',
};

const CAT_COLORS = {
  '긴급': '#ff5252',
  '관공서': '#5c6bc0',
  '공공기관': '#26a69a',
  '통신': '#42a5f5',
  '금융': '#ef5350',
  'IT/전자': '#7e57c2',
  '택배/물류': '#ff7043',
  '쇼핑': '#ec407a',
  '항공/여행': '#26c6da',
  '자동차': '#8d6e63',
  '외국계기업': '#66bb6a',
  '유통': '#ffa726',
  '식품': '#d4e157',
};

// ===== 운영시간 체크 =====
function isOpen(hours) {
  if (!hours) return null;
  if (hours.includes('24')) return true;
  if (hours.includes('평일')) {
    const now = new Date();
    const day = now.getDay(); // 0=일, 6=토
    if (day === 0 || day === 6) return false;
    const h = now.getHours(), m = now.getMinutes();
    const totalMin = h * 60 + m;
    return totalMin >= 9 * 60 && totalMin < 18 * 60;
  }
  return null; // 판별 불가
}

// ===== 데이터 로드 =====
async function loadData() {
  const res = await fetch('contacts_v1.json');
  allContacts = await res.json();
  buildCatChips();
  render();
}

function buildCatChips() {
  const cats = ['ALL', ...new Set(allContacts.map(c => c.category))];
  const row = document.getElementById('catRow');
  row.innerHTML = cats.map(cat => `
    <button class="cat-chip ${cat === 'ALL' ? 'active' : ''}" data-cat="${cat}" onclick="selectCat('${cat}')">
      ${cat === 'ALL' ? '🔍 전체' : (CAT_ICONS[cat] || '') + ' ' + cat}
    </button>
  `).join('');
}

function selectCat(cat) {
  currentCat = cat;
  document.querySelectorAll('.cat-chip').forEach(b => b.classList.toggle('active', b.dataset.cat === cat));
  render();
}

// ===== 렌더링 =====
function render() {
  if (currentTab === 'history') {
    renderHistory();
    return;
  }

  let list = allContacts;
  if (currentTab === 'fav') list = list.filter(c => favorites.includes(c.id));
  if (currentCat !== 'ALL') list = list.filter(c => c.category === currentCat);
  if (searchQ) {
    const q = searchQ.toLowerCase();
    list = list.filter(c =>
      c.name.toLowerCase().includes(q) ||
      c.tel.includes(q) ||
      c.subcategory.toLowerCase().includes(q) ||
      c.category.toLowerCase().includes(q)
    );
  }

  document.getElementById('resultCount').textContent = `${list.length}개 검색됨`;

  if (!list.length) {
    document.getElementById('contactList').innerHTML = `
      <div class="empty">
        <div class="empty-icon">🔍</div>
        <div>${currentTab === 'fav' ? '즐겨찾기가 없어요' : '검색 결과가 없습니다'}</div>
      </div>`;
    return;
  }

  const isFav = id => favorites.includes(id);
  document.getElementById('contactList').innerHTML = list.map(c => {
    const openStatus = isOpen(c.hours);
    const dotHtml = openStatus !== null
      ? `<div class="open-dot ${openStatus ? 'open' : 'closed'}"></div>`
      : '';
    return `
    <div class="contact-card" onclick="openDetail('${c.id}')">
      <div class="contact-icon" style="background:${(CAT_COLORS[c.category] || '#e0e0e0')}22;">
        ${CAT_ICONS[c.category] || '📞'}
        ${dotHtml}
      </div>
      <div class="contact-info">
        <div class="contact-name">${c.name}</div>
        <div class="contact-sub">${c.category} · ${c.subcategory}</div>
        <div class="contact-tel">${c.tel}</div>
      </div>
      <a class="call-btn" href="tel:${c.tel.replace(/[^0-9+]/g,'')}" onclick="event.stopPropagation();recordCall('${c.id}')">📞</a>
      <button class="fav-btn" onclick="toggleFav(event,'${c.id}')">${isFav(c.id) ? '⭐' : '☆'}</button>
    </div>
  `;
  }).join('');
}

// ===== 최근 통화 히스토리 렌더 =====
function renderHistory() {
  document.getElementById('resultCount').textContent = `최근 통화 ${callHistory.length}건`;

  if (!callHistory.length) {
    document.getElementById('contactList').innerHTML = `
      <div class="empty">
        <div class="empty-icon">📋</div>
        <div>아직 통화 기록이 없어요</div>
      </div>`;
    return;
  }

  // 최신 순, 중복 허용
  const items = callHistory.slice().reverse();
  document.getElementById('contactList').innerHTML = items.map(h => {
    const c = allContacts.find(x => x.id === h.id);
    const name = c ? c.name : h.name;
    const tel = c ? c.tel : h.tel;
    const timeStr = formatTime(h.ts);
    return `
    <div class="history-card">
      <div class="history-icon">📞</div>
      <div class="history-info">
        <div class="history-name">${name}</div>
        <div class="history-tel">${tel}</div>
        <div class="history-time">${timeStr}</div>
      </div>
      <a class="history-call-btn" href="tel:${tel.replace(/[^0-9+]/g,'')}">📞</a>
    </div>
  `;
  }).join('');
}

function formatTime(ts) {
  const d = new Date(ts);
  const now = new Date();
  const diff = now - d;
  const min = Math.floor(diff / 60000);
  if (min < 1) return '방금 전';
  if (min < 60) return `${min}분 전`;
  const h = Math.floor(min / 60);
  if (h < 24) return `${h}시간 전`;
  const day = Math.floor(h / 24);
  return `${day}일 전`;
}

// ===== 통화 기록 =====
function recordCall(id) {
  const c = allContacts.find(x => x.id === id);
  if (!c) return;
  callHistory.push({ id, name: c.name, tel: c.tel, ts: Date.now() });
  // 최대 50개
  if (callHistory.length > 50) callHistory = callHistory.slice(-50);
  localStorage.setItem('baro-callhistory', JSON.stringify(callHistory));
}

// ===== 상세 모달 =====
function openDetail(id) {
  const c = allContacts.find(x => x.id === id);
  if (!c) return;
  const isFav = favorites.includes(id);
  const hoursClass = c.hours.includes('24') ? 'hours-24' : 'hours-weekday';
  const openStatus = isOpen(c.hours);
  const openLabel = openStatus === true ? '🟢 운영중' : openStatus === false ? '🔴 운영시간 외' : '';

  document.getElementById('modalContent').innerHTML = `
    <div style="display:flex;justify-content:space-between;align-items:flex-start;">
      <div>
        <div class="modal-name">${c.name}</div>
        <div class="modal-cat">${c.category} · ${c.subcategory}</div>
      </div>
      <button onclick="toggleFav(event,'${c.id}');this.textContent=favorites.includes('${c.id}')?'⭐':'☆'" style="font-size:24px;background:none;border:none;cursor:pointer;">${isFav ? '⭐' : '☆'}</button>
    </div>
    <div class="modal-row">
      <div class="modal-row-icon">📞</div>
      <div>
        <div class="modal-row-label">전화번호</div>
        <div class="modal-row-val">${c.tel}</div>
      </div>
    </div>
    <div class="modal-row">
      <div class="modal-row-icon">🕐</div>
      <div>
        <div class="modal-row-label">운영시간 ${openLabel}</div>
        <div class="modal-row-val"><span class="hours-badge ${hoursClass}">${c.hours}</span></div>
      </div>
    </div>
    ${c.ars ? `<div class="ars-tip">💡 ARS 단축 안내<br>${c.ars.split('/').join('<br>')}</div>` : ''}
    <a class="modal-call-btn" href="tel:${c.tel.replace(/[^0-9+]/g,'')}" onclick="recordCall('${c.id}')">
      📞 지금 전화하기
    </a>
  `;
  document.getElementById('modalBackdrop').classList.add('show');
}

function closeModal(e) {
  if (e.target === document.getElementById('modalBackdrop'))
    document.getElementById('modalBackdrop').classList.remove('show');
}

// ===== 즐겨찾기 =====
function toggleFav(e, id) {
  e.stopPropagation();
  if (favorites.includes(id)) favorites = favorites.filter(f => f !== id);
  else favorites.push(id);
  localStorage.setItem('baro-favorites', JSON.stringify(favorites));
  render();
}

// ===== 탭 전환 =====
function showTab(tab) {
  currentTab = tab;
  document.querySelectorAll('.tab-btn').forEach(b => {
    b.classList.toggle('active', b.dataset.tab === tab);
  });

  if (tab === 'suggest') {
    // 탭을 'suggest' 상태 유지, 모달 열기
    openReportModal();
    return;
  }
  render();
}

// ===== 번호 제보 모달 =====
function openReportModal() {
  document.getElementById('reportBackdrop').classList.add('show');
}

function closeReportModal() {
  document.getElementById('reportBackdrop').classList.remove('show');
  // 탭을 home으로 되돌리기
  currentTab = 'home';
  document.querySelectorAll('.tab-btn').forEach(b => {
    b.classList.toggle('active', b.dataset.tab === 'home');
  });
}

function closeReport(e) {
  if (e.target === document.getElementById('reportBackdrop')) closeReportModal();
}

function submitReport() {
  const name = document.getElementById('reportName').value.trim();
  const tel = document.getElementById('reportTel').value.trim();
  const cat = document.getElementById('reportCat').value;
  const ars = document.getElementById('reportArs').value.trim();

  if (!name || !tel || !cat) {
    showToast('기관명, 전화번호, 카테고리를 입력해주세요');
    return;
  }

  // localStorage에 저장
  const reports = JSON.parse(localStorage.getItem('baro-reports') || '[]');
  reports.push({ name, tel, cat, ars, ts: Date.now() });
  localStorage.setItem('baro-reports', JSON.stringify(reports));

  // 폼 초기화
  document.getElementById('reportName').value = '';
  document.getElementById('reportTel').value = '';
  document.getElementById('reportCat').value = '';
  document.getElementById('reportArs').value = '';

  closeReportModal();
  showToast('제보해주셔서 감사합니다! 🙏');
}

// ===== 토스트 =====
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2500);
}

// ===== 최근 검색어 =====
function saveSearch(q) {
  if (!q) return;
  recentSearches = recentSearches.filter(s => s !== q);
  recentSearches.unshift(q);
  recentSearches = recentSearches.slice(0, 5); // 최대 5개 저장
  localStorage.setItem('baro-recentsearch', JSON.stringify(recentSearches));
}

function deleteRecentSearch(q) {
  recentSearches = recentSearches.filter(s => s !== q);
  localStorage.setItem('baro-recentsearch', JSON.stringify(recentSearches));
  showRecentDropdown();
}

function showRecentDropdown() {
  const dropdown = document.getElementById('recentDropdown');
  const top3 = recentSearches.slice(0, 3);
  if (!top3.length) {
    dropdown.classList.remove('show');
    return;
  }
  dropdown.innerHTML = `
    <div class="recent-search-header">최근 검색어</div>
    ${top3.map(q => `
      <div class="recent-search-item" onclick="applyRecentSearch('${q.replace(/'/g,"\\'")}')">
        <span class="recent-search-icon">🕐</span>
        <span>${q}</span>
        <button class="recent-search-del" onclick="event.stopPropagation();deleteRecentSearch('${q.replace(/'/g,"\\'")}')">✕</button>
      </div>
    `).join('')}
  `;
  dropdown.classList.add('show');
}

function applyRecentSearch(q) {
  document.getElementById('searchInput').value = q;
  searchQ = q;
  document.getElementById('recentDropdown').classList.remove('show');
  render();
}

// ===== 이벤트 리스너 =====
const searchInput = document.getElementById('searchInput');

searchInput.addEventListener('focus', () => {
  if (recentSearches.length) showRecentDropdown();
});

searchInput.addEventListener('input', e => {
  searchQ = e.target.value.trim();
  document.getElementById('recentDropdown').classList.remove('show');
  render();
});

searchInput.addEventListener('keydown', e => {
  if (e.key === 'Enter' && searchQ) {
    saveSearch(searchQ);
    document.getElementById('recentDropdown').classList.remove('show');
    searchInput.blur();
  }
});

// 검색창 외부 클릭 시 드롭다운 닫기
document.addEventListener('click', e => {
  if (!document.getElementById('searchWrap').contains(e.target)) {
    document.getElementById('recentDropdown').classList.remove('show');
    // 검색 실행 후 저장
    if (searchQ) saveSearch(searchQ);
  }
});

loadData();
</script>
</body>
</html>
